services:
  postgres:
    image: postgres:16-alpine
    container_name: reliquia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reliquia
      POSTGRES_PASSWORD: reliquia
      POSTGRES_DB: reliquia_hub
    ports:
      - "5432:5432"
    volumes:
      - reliquia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliquia -d reliquia_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: reliquia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - reliquia_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  reliquia_postgres_data:
  reliquia_redis_data:
